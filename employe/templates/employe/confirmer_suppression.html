{% extends 'employe/base.html' %}

{% block content %}
<form method="post" class="space-y-4 flex-col">
    <span class="text-center">Es-tu sure de vouloir supprimer !? <strong>{{employe.nom}}</strong></span>

    <div class="flex flex-col gap-2 ">

        <a href="{% url 'liste_employes'  %}" class="btn btn-primary w-full">Annuler</a>
    </div>





</form>

{% endblock %}
